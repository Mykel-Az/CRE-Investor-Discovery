services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: cre_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cre
      POSTGRES_PASSWORD: cre
      POSTGRES_DB: cre_investor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cre_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:
