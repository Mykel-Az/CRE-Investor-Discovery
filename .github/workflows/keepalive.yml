name: Keepalive

on:
  schedule:
    - cron: '*/5 * * * *'  # every 5 minutes — prevents Railway container sleep
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -sf --max-time 10 \
            https://cre-investor-discovery-production.up.railway.app/health \
            && echo "OK" || echo "WARN: health check failed (container may be cold-starting)"
