name: Keepalive

on:
  schedule:
    - cron: '*/4 * * * *'  # every 4 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping health endpoint
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -sf --max-time 15 --write-out "%{http_code}" --output /dev/null \
              https://cre-investor-discovery-production.up.railway.app/health) || true
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "OK"
              exit 0
            fi
            sleep 5
          done
          echo "WARN: health check failed after 3 attempts"
          exit 0  # don't fail the workflow, just warn